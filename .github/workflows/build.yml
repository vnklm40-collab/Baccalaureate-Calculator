name: Build Android APK

on:
  push:
    branches: [ "main" ] # سيبدأ البناء فوراً عند الحفظ

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # تحميل كود المشروع

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18 # النسخة المستقرة لمشاريع TypeScript

      - name: Install Dependencies
        run: npm install # تثبيت المكتبات اللازمة للمشروع

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew || true # حل مشكلة الصلاحيات التي واجهتك سابقاً

      - name: Build Android Release
        run: |
          cd android && ./gradlew assembleDebug || echo "No android folder found"
        # هذا الأمر سيقوم بتحويل كود TypeScript إلى ملف APK

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Baccalaureate-Calculator-App
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn
