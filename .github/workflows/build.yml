name: Build Android APK
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8 # نسخة مستقرة

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install # هذا سيحل مشكلة الخطأ في الصورة

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Android APK
        run: |
          # البحث الذكي عن ملف البناء
          GRADLEW_PATH=$(find . -name gradlew)
          if [ -z "$GRADLEW_PATH" ]; then
            echo "خطأ: لم يتم العثور على ملفات أندرويد"
            exit 1
          fi
          chmod +x $GRADLEW_PATH
          cd $(dirname $GRADLEW_PATH)
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Baccalaureate-Calculator-App
          path: "**/build/outputs/apk/debug/*.apk"
